<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi Step Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
   <div class="form-container">
    <aside class="sidebar">
        <ul>
            <li><span>1</span> YOUR INFO</li>
            <li><span>2</span>SELECT PLAN</li>
            <li><span>3</span>ADD-ONS</li>
            <li><span>4</span>SUMMARY</li>
        </ul>
    </aside>
    <main>
        <section class="form-content">
            <h2>Personal info</h3>
            <p>Please provide your name,email address and phone number
            </p>
            <label for="name">Name</label>
            <input type="text" placeholder="e.g. Stephen King" id="name">
            <label for="email">Email Address</label>
            <input type="email" placeholder="e.g. stephenking@lorem.com" id="email">
            <label for="number">Phone Number</label>
            <input type="text" placeholder="e.g. +1 234 567890" id="number">
            <button>Next Step</button>
        </section>
    </main>
   </div> 
</body>
</html>
