<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <form action="">
        <h3>Contact Us</h3>
        <div class="div1">
            <div>
                <label for="first-name" class="first-name">First Name</label><br>
                <input type="text" class="first-name" id="first-name">
            </div>
            <div>
                <label for="last-name" class="last-name">Last Name</label><br>
                <input type="text" class="last-name" id="last-name">
            </div>
        </div>
        <label for="email" class="email">Email Address</label><br>
        <input type="email" name="email" class="email" id="email"><br>
        <label for="" class="query">
            Query Type
        </label>
        <div class="div2">
            <div class="radio1">
                <input type="radio" name="General inquiry" id="radio">
                <label for="radio" class="radio">General Inquiry</label>
            </div>
            <div class="radio2">
                <input type="radio" name="" id="radio">
                <label for="radio" class="radio">Support Request</label>
            </div>
        </div>
        <label for="message" class="message">Message</label><br>
        <textarea name="" class="message" id="message"></textarea><br>
        <input type="checkbox" name="" id="checkbox">
        <label for="checkbox">I consent to being contacted by the team</label><br>
        <button type="submit" class="button">Submit</button>

    </form>
</body>

</html>
